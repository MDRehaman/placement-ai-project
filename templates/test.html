<!DOCTYPE html>
<html>
<head>
<title>Take Test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
.card:hover {
    transform: scale(1.05);
    transition: 0.3s;
}
.company-card {
    background:white;
    border-radius:15px;
    padding:25px;
    text-align:center;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.05);
}
.company-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}
.company-card img {
    width: 70px;
    margin-bottom: 10px;
}
.company-logo {
    height:60px;
    margin-bottom:10px;
}
.back-btn {
    position: fixed;
    top: 60px;
    left: 25px;

    padding: 10px 20px;
    border-radius: 30px;

    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: 500;
    text-decoration: none;

    box-shadow: 0 5px 20px rgba(0,0,0,0.2);

    transition: all 0.3s ease;
}

/* HOVER EFFECT */
.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* CLICK EFFECT */
.back-btn:active {
    transform: scale(0.95);
}

/* GLOW ANIMATION */
.back-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    z-index: -1;
    filter: blur(15px);
    opacity: 0.6;
}
</style>

</head>

<body style="background:#f5f7fa;">
{% include 'navbar.html' %}
<div class="container mt-5">

<h3 class="text-center mb-4">Choose Company Test</h3>

<div class="row">

{% for c in companies %}

<div class="col-md-4 mb-4">

<a href="/start_test/{{c[0]}}" style="text-decoration:none;">

<div class="company-card">
<img src="/static/logos/{{c[0]}}.png" class="company-logo"
onerror="this.src='https://via.placeholder.com/60'">

<h5>{{c[0]}}</h5>
<p>Start Mock Test</p>

</div>

</a>

</div>

{% endfor %}

</div>

</div>
<a href="javascript:history.back()" class="back-btn">
    ← Back
</a>
</body>
</html>
