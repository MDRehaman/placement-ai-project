<style>

.navbar {
    position: sticky;
    top: 0;
    z-index: 1000;
    background: #ffffff;
    padding: 12px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 2px 15px rgba(0,0,0,0.05);
}

.logo {
    font-size: 20px;
    font-weight: 600;
    color: #111;
}

.nav-links a {
    margin-left: 25px;
    text-decoration: none;
    color: #555;
    font-weight: 500;
    position: relative;
    transition: 0.3s;
}

.nav-links a:hover {
    color: #007bff;
}

.nav-links a::after {
    content: '';
    position: absolute;
    width: 0%;
    height: 2px;
    bottom: -5px;
    left: 0;
    background: #007bff;
    transition: 0.3s;
}

.nav-links a:hover::after {
    width: 100%;
}

.logout {
    color: red !important;
    font-weight: 600;
}

.active {
    color: #007bff !important;
}

.active::after {
    width: 100% !important;
}

</style>

<nav class="navbar">

<div class="logo">Placement AI</div>
<span style="margin-left:20px; color:#555;">
    👤 {{ session['student_id'] }}
</span>

<div class="nav-links">
    <a href="/dashboard" class="{% if active_page=='dashboard' %}active{% endif %}">Home</a>
    <a href="/companies" class="{% if active_page=='companies' %}active{% endif %}">Companies</a>
    <a href="/questions" class="{% if active_page=='questions' %}active{% endif %}">Questions</a>
    <a href="/test" class="{% if active_page=='test' %}active{% endif %}">Test</a>
    <a href="/history" class="{% if active_page=='history' %}active{% endif %}">History</a>
    <a href="/logout" class="logout">Logout</a>
</div>

</nav>
