<!DOCTYPE html>
<html>
<head>
<title>Exam</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

<style>
body { background:#eef2f7; }

.question-box {
    background:white;
    padding:20px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0px 2px 10px rgba(0,0,0,0.1);
}

.timer {
    position:fixed;
    top:10px;
    right:20px;
    background:#ff4d4d;
    color:white;
    padding:10px 15px;
    border-radius:10px;
    font-weight:bold;
}
.question-box {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
}
.back-btn {
    position: fixed;
    top: 60px;
    left: 25px;

    padding: 10px 20px;
    border-radius: 30px;

    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    font-weight: 500;
    text-decoration: none;

    box-shadow: 0 5px 20px rgba(0,0,0,0.2);

    transition: all 0.3s ease;
}

/* HOVER EFFECT */
.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* CLICK EFFECT */
.back-btn:active {
    transform: scale(0.95);
}

/* GLOW ANIMATION */
.back-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    z-index: -1;
    filter: blur(15px);
    opacity: 0.6;
}
</style>

</head>

<body>
<div class="timer">
⏱ Time Left: <span id="time">60</span>s
</div>

<div class="container mt-5">

<h2 class="text-center mb-4">{{company}} Mock Test</h2>

<form method="POST" action="/submit_test">
    <input type="hidden" name="company" value="{{company}}">

{% for q in questions %}

<div class="question-box">

<h5>Q{{loop.index}}. {{q[1]}}</h5>
 <input type="radio" name="q{{q[0]}}" value="A"> {{q[2]}}<br>
    <input type="radio" name="q{{q[0]}}" value="B"> {{q[3]}}<br>
    <input type="radio" name="q{{q[0]}}" value="C"> {{q[4]}}<br>
    <input type="radio" name="q{{q[0]}}" value="D"> {{q[5]}}<br>
</div>

{% endfor %}

<div class="text-center">
<button type="submit" class="btn btn-success btn-lg">Submit Test</button>
</div>

</form>

</div>

<script>
let time = 60;
let timer = setInterval(function() {
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
        clearInterval(timer);
        alert("Time's up! Submitting test...");
        document.forms[0].submit();
    }
}, 1000);
</script>
<a href="javascript:history.back()" class="back-btn">
    ← Back
</a>
</body>
</html>
